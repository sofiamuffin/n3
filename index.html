<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Доступ до посилання</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #4B0082, #0000FF);
      color: white;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 30px 20px;
      border-radius: 16px;
      background: rgba(0,0,0,0.3);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    .arrow {
      font-size: 100px;
      animation: pulse 1.5s infinite;
      margin: 20px 0;
      text-shadow: 2px 2px 4px black;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity:1; }
      50% { transform: scale(1.2); opacity:0.7; }
      100% { transform: scale(1); opacity:1; }
    }
    .instruction {
      font-size: 22px;
      font-weight: bold;
      margin: 10px 0;
      text-shadow: 1px 1px 3px black;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="arrow">👆</div>
    <div class="instruction">Натисніть на меню "..."</div>
    <div class="arrow">🌐</div>
    <div class="instruction">Оберіть "Відкрити в браузері"</div>
  </div>

  <script>
    const REDIRECT_URL = "https://google.com"; // ← Встав своє посилання

    // Функція перевірки TikTok WebView
    function isTikTokWebView() {
      return /TikTok/i.test(navigator.userAgent);
    }

    // Якщо НЕ TikTok WebView (тобто браузер) → редіректимо автоматично
    if (!isTikTokWebView()) {
      window.location.href = REDIRECT_URL;
    }

    // TikTok WebView → нічого не робимо, показуємо інструкцію
  </script>
</body>
</html>
